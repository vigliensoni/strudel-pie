<!doctype html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body { background: black; overflow: hidden; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <script src="https://unpkg.com/hydra-synth"></script>
  <script>
    // 1. instantiate Hydra, point it at our canvas
    var hydra = new Hydra({
      canvas: document.getElementById("canvas"),
      detectAudio: false
    });

    // 2. write patches exactly as in the editor
    osc(12, -0.05, 1.5)
      .kaleid(4)
      .modulate(noise(1), 0.1)
      .out();
  </script>

</body>
</html>
